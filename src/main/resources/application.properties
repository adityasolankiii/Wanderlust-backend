spring.application.name=wanderlust

# ─── Server ───
server.port=8080

# ─── MySQL Datasource ───
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ───
app.jwt.secret=${JWT_SECRET}
# SOC2: Reduced token expiration to 4 hours
app.jwt.expiration-ms=14400000

# ─── Cloudinary ───
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ─── Mapbox ───
mapbox.access-token=${MAPBOX_ACCESS_TOKEN}

# ─── Razorpay ───
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

# ─── File Upload ───
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── CORS ───
app.cors.allowed-origins=${FRONTEND_URL}
# ─── Security (SOC2 / GDPR) ───
# AES-256 key for PII encryption at rest (Base64-encoded, 32 bytes)
app.security.pii-encryption-key=${PII_ENCRYPTION_KEY}
# Maximum failed login attempts before temporary lockout
app.security.max-login-attempts=5
# Login lockout duration in minutes
app.security.lockout-duration-minutes=15

# ─── Email (Gmail SMTP) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_USERNAME}

# ─── OAuth2 (Social Login) ───
# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Facebook
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# Apple
spring.security.oauth2.client.registration.apple.client-id=${APPLE_CLIENT_ID:your-apple-client-id}
spring.security.oauth2.client.registration.apple.client-secret=${APPLE_CLIENT_SECRET:your-apple-client-secret}
spring.security.oauth2.client.registration.apple.scope=openid,email,name
spring.security.oauth2.client.registration.apple.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.apple.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.apple.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.apple.authorization-uri=https://appleid.apple.com/auth/authorize
spring.security.oauth2.client.provider.apple.token-uri=https://appleid.apple.com/auth/token
spring.security.oauth2.client.provider.apple.jwk-set-uri=https://appleid.apple.com/auth/keys
spring.security.oauth2.client.provider.apple.user-name-attribute=sub

# ─── Password Reset ───
app.password-reset.token-expiry-minutes=30
app.frontend-url=${FRONTEND_URL}
